# Code-quality gate (BUILD-LIST P8): typecheck + lint + tests on every PR to main.
# The Vercel deploy build is the only other check and it does NOT run the test suite —
# this does. No app secrets needed: tsc, eslint, and vitest don't touch the Supabase /
# Stripe env (only `next build` does, which Vercel owns).
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group: {}
  workflow_dispatch: {}

permissions:
  contents: read

# Newer pushes to the same ref supersede in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Authz-contract check
        run: pnpm check:authz
      - name: Canon check (member copy)
        run: pnpm check:canon
      - name: Admin-menu contract check
        run: pnpm check:menu
      - name: Elements contract check (one catalog + store, mounted via registry)
        run: pnpm check:elements
      - name: Token contract check (no hardcoded style)
        run: pnpm check:tokens
      - name: Header contract check (no hand-rolled page <h1>)
        run: pnpm check:headers
      - name: SEO/sitemap coherence
        run: pnpm check:seo
      - name: RLS coverage (static shift-left of the DB advisors)
        run: pnpm check:rls
      # NOTE: check:cron-freshness is intentionally NOT wired here — it is a runtime/ops
      # SLO check (inspects live cron heartbeat state, env-dependent, advisory exit 0), not
      # a deterministic code gate. It runs in the scheduled /maintenance sweep instead.
