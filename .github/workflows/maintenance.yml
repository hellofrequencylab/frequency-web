# Scheduled maintenance sweep (docs/MAINTENANCE-AUTOMATION.md Phase 3). The Tier-2 loop:
# weekly, surface only what's NEW (time-based signals that per-PR CI can't catch), and open a
# single tracking issue when there's something to act on — silent otherwise.
#
# What runs with NO secrets (always):
#   - pnpm audit (dependency vulnerabilities are disclosed over time, not tied to a PR)
# What runs WHEN the owner adds SUPABASE_ACCESS_TOKEN (arms the stateful advisor diff):
#   - fetch Supabase security + performance advisors, diff against the accepted-risk allowlist
#     (scripts/maintenance/accepted-advisories.json), report only new findings.
#
# On any new WARN/ERROR it creates-or-updates one issue titled "🔧 Weekly maintenance sweep";
# a clean run adds nothing (quiet-by-default). Phase 4 layers an AI triage step on top.
name: maintenance
on:
  schedule:
    - cron: '17 7 * * 1' # Mondays 07:17 UTC (off the :00 stampede)
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: maintenance
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # ── Dependency vulnerabilities (no secret needed) ──────────────────────────
      - name: pnpm audit
        id: audit
        run: |
          set +e
          OUT=$(pnpm audit --prod --audit-level=moderate 2>&1)
          CODE=$?
          echo "$OUT"
          {
            echo "## Dependency audit"
            if [ $CODE -eq 0 ]; then echo "✓ pnpm audit clean (moderate+)."
            else echo "⚠️ pnpm audit found advisories:"; echo '```'; echo "$OUT" | tail -40; echo '```'; fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$OUT" > audit.txt
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      # ── Supabase advisor drift (stateful diff) — only when the token is present ──
      - name: Supabase advisor diff
        id: advisors
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set +e
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "skipped=1" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Supabase advisor diff skipped — set the SUPABASE_ACCESS_TOKEN secret + SUPABASE_PROJECT_REF var to arm it." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          BASE="https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/advisors"
          curl -sS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" "$BASE/security" > sec.json
          curl -sS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" "$BASE/performance" > perf.json
          REPORT=$(node scripts/maintenance/advisor-diff.mjs sec.json perf.json)
          CODE=$?
          echo "$REPORT"
          { echo "## Supabase advisors (new only)"; echo "$REPORT"; echo ""; } >> "$GITHUB_STEP_SUMMARY"
          echo "$REPORT" > advisors.txt
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      # ── AI triage (Phase 4) — optional, uses the existing ANTHROPIC_API_KEY. Advises only;
      #    never edits code. Non-fatal, so the deterministic report always ships. ──────────
      - name: AI triage
        if: steps.audit.outputs.code != '0' || steps.advisors.outputs.code == '1'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --experimental-strip-types scripts/maintenance/sweep.mts

      # ── Open / update one tracking issue only when there's something to act on ──
      - name: Report to a tracking issue on delta
        if: steps.audit.outputs.code != '0' || steps.advisors.outputs.code == '1'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs')
            const read = (f) => { try { return fs.readFileSync(f, 'utf8') } catch { return '' } }
            const body = [
              `Automated weekly maintenance sweep (${new Date().toISOString().slice(0,10)}). New items only — see docs/MAINTENANCE-AUTOMATION.md.`,
              '',
              read('triage.md') && ('### Triage\n' + read('triage.md')),
              read('audit.txt') && ('### Dependency audit\n```\n' + read('audit.txt').split('\n').slice(-40).join('\n') + '\n```'),
              read('advisors.txt') && ('### Supabase advisors (new)\n' + read('advisors.txt')),
            ].filter(Boolean).join('\n')
            const title = '🔧 Weekly maintenance sweep'
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100,
            })
            const existing = open.find((i) => i.title === title && !i.pull_request)
            if (existing) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body })
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body: 'Re-ran — findings above refreshed.' })
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body })
            }
